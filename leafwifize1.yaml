# Board: ESP32-C3 Super Mini (Generic)
# Definition: definitions/boards/esp32-c3-supermini/manifest.yaml

esphome:
  name: esp-leaf
  friendly_name: ESP_Leaf

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

api:
  encryption:
    key: "YOUR_ENCRYPTION_KEY_HERE" 

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: LeafCAN
    password: "12345678"

captive_portal:

# ==============================================================================
# NISSAN LEAF ZE1 - CAN MONITOR  (Listen-Only Release)
# ESP32-C3 Super Mini + SN65HVD230
# EV-CAN | TX=GPIO4 | RX=GPIO3 | 500 kbps
# ==============================================================================

logger:
  level: INFO
  logs:
    canbus: WARN
    esp32_can: WARN

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Lisbon"

# ==============================================================================
# WEB SERVER (Modern UI)
# ==============================================================================
web_server:
  port: 80
  version: 3
  include_internal: true

# ------------------------------------------------------------------------------
# GLOBALS
# ------------------------------------------------------------------------------
globals:
  - id: is_charging
    type: bool
    initial_value: "false"

  - id: last_voltage
    type: float
    initial_value: "0.0"

  - id: last_current
    type: float
    initial_value: "0.0"

  - id: last_power
    type: float
    initial_value: "0.0"

  - id: last_discharge_limit
    type: float
    initial_value: "0.0"

  - id: last_charge_limit
    type: float
    initial_value: "0.0"

  - id: last_obc_power
    type: float
    initial_value: "0.0"

  - id: last_charge_time
    type: float
    initial_value: "0.0"

  - id: last_inv_temp
    type: float
    initial_value: "0.0"

  - id: full_capacity_wh
    type: float
    initial_value: "0.0"

  - id: remaining_energy_wh
    type: float
    initial_value: "0.0"

# ------------------------------------------------------------------------------
# ONBOARD RGB LED
# ------------------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    name: "Status LED"
    id: status_led
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812

# ==============================================================================
# CAN BUS (LISTEN ONLY)
# ==============================================================================
canbus:
  - platform: esp32_can
    tx_pin: GPIO4
    rx_pin: GPIO3
    can_id: 999
    bit_rate: 500KBPS

    on_frame:

      # --------------------------------------------------------------------------
      # 0x11A - Vehicle state / Gearbox
      # --------------------------------------------------------------------------
      - can_id: 0x11A
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 2) {
                uint8_t gear = (x[0] >> 4) & 0x0F;

                if (gear == 1) id(gear_shift_sensor).publish_state("Park");
                else if (gear == 2) id(gear_shift_sensor).publish_state("Reverse");
                else if (gear == 3) id(gear_shift_sensor).publish_state("Neutral");
                else if (gear == 4) id(gear_shift_sensor).publish_state("Drive");
                else if (gear == 7) id(gear_shift_sensor).publish_state("Eco/B");
                else id(gear_shift_sensor).publish_state("Unknown");

                uint8_t car_on = (x[1] >> 5) & 0x07;

                if (car_on == 0) id(car_status_sensor).publish_state("OFF");
                else if (car_on == 1) id(car_status_sensor).publish_state("ACC");
                else if (car_on == 2 || car_on == 3) id(car_status_sensor).publish_state("ON");
                else if (car_on == 4) id(car_status_sensor).publish_state("Charging/Standby");
                else id(car_status_sensor).publish_state("Unknown");
              }

      # --------------------------------------------------------------------------
      # 0x1D4 - Charge state
      # --------------------------------------------------------------------------
      - can_id: 0x1D4
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 7) {
                uint8_t b6 = x[6];

                if (b6 == 0xE0) {
                  id(is_charging) = true;

                  if (fabs(id(last_current)) > 0.5) {
                    id(charge_status_sensor).publish_state("Charging");
                  } else {
                    id(charge_status_sensor).publish_state("Plugged/Standby");
                  }

                } else if (b6 == 0x8C) {
                  id(is_charging) = false;
                  id(charge_status_sensor).publish_state("Interrupted");
                } else {
                  id(is_charging) = false;
                  id(charge_status_sensor).publish_state("Disconnected/Idle");
                }

                bool hv_supply = x[4] & 0x04;
                bool relay_plus = x[5] & 0x40;

                id(hv_supply_status_sensor).publish_state(hv_supply ? "Active" : "Inactive");
                id(relay_plus_status_sensor).publish_state(relay_plus ? "On" : "Off");
              }

      # --------------------------------------------------------------------------
      # 0x1DB - Voltage, current, power
      # --------------------------------------------------------------------------
      - can_id: 0x1DB
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 6) {

                // CURRENT
                int16_t raw_current = ((x[0] << 3) | (x[1] >> 5)) & 0x7FF;
                if (raw_current & 0x400) raw_current |= 0xF800;
                float current = raw_current * 0.5;

                if (fabs(current) < 400.0) {
                  if (id(last_current) == 0.0 || fabs(current - id(last_current)) < 50.0) {
                    id(last_current) = current;
                    id(battery_current_sensor).publish_state(current);
                  }
                }

                // VOLTAGE
                uint16_t raw_voltage = ((x[2] << 2) | (x[3] >> 6)) & 0x3FF;
                float voltage = raw_voltage * 0.5;

                if (voltage > 250.0 && voltage < 450.0) {
                  if (id(last_voltage) == 0.0 || fabs(voltage - id(last_voltage)) < 50.0) {
                    id(last_voltage) = voltage;
                    id(battery_voltage_sensor).publish_state(voltage);
                  }
                }

                // POWER
                float power_kw = (id(last_current) * id(last_voltage)) / 1000.0;

                if (fabs(power_kw) < 150.0) {
                  if (id(last_power) == 0.0 || fabs(power_kw - id(last_power)) < 50.0) {
                    id(last_power) = power_kw;
                    id(hv_power_sensor).publish_state(power_kw);
                  }
                }

                if (!isnan(id(lbc_soc_sensor).state)) {
                  id(usable_soc_sensor).publish_state(id(lbc_soc_sensor).state);
                }
              }

      # --------------------------------------------------------------------------
      # 0x1DC - Charge and discharge limits
      # --------------------------------------------------------------------------
      - can_id: 0x1DC
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 4) {

                uint16_t raw_discharge = ((x[0] << 2) | (x[1] >> 6)) & 0x3FF;
                float d = raw_discharge * 0.25;

                if (d > 0 && d < 200) {
                  if (id(last_discharge_limit) == 0 || fabs(d - id(last_discharge_limit)) < 30) {
                    id(last_discharge_limit) = d;
                    id(discharge_limit_sensor).publish_state(d);
                  }
                }

                uint16_t raw_charge = ((x[1] << 4) | (x[2] >> 4)) & 0x3FF;
                float c = raw_charge * 0.25;

                if (c > 0 && c < 120) {
                  if (id(last_charge_limit) == 0 || fabs(c - id(last_charge_limit)) < 20) {
                    id(last_charge_limit) = c;
                    id(charge_limit_sensor).publish_state(c);
                  }
                }
              }

      # --------------------------------------------------------------------------
      # 0x390 - OBC / On-board charger
      # --------------------------------------------------------------------------
      - can_id: 0x390
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 7) {
                uint16_t raw_obc_power = ((x[5] << 1) | (x[6] >> 7)) & 0x1FF;
                float obc_power_kw = raw_obc_power * 0.1;

                if (obc_power_kw > 0.1 && obc_power_kw < 10.0) {
                  id(last_obc_power) = obc_power_kw;
                  id(obc_max_power_sensor).publish_state(obc_power_kw);
                } else if (id(is_charging)) {
                  id(obc_max_power_sensor).publish_state(id(last_obc_power));
                }
              }

      # --------------------------------------------------------------------------
      # 0x54A - AC ambient temperature
      # --------------------------------------------------------------------------
      - can_id: 0x54A
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 8) {
                if (x[7] != 0xFF) {
                  float temp_ac = x[7] - 40.0;
                  if (temp_ac > -30.0 && temp_ac < 60.0) {
                    id(ambient_ac_sensor).publish_state(temp_ac);
                  }
                }
              }

      # --------------------------------------------------------------------------
      # 0x54B - HVAC status + Fan + Vent + Intake
      # --------------------------------------------------------------------------
      - can_id: 0x54B
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 5) {
                int fan_speed = ((x[4] & 0x38) >> 3);

                if (fan_speed >= 0 && fan_speed <= 7) {
                  id(hvac_fan_sensor).publish_state((fan_speed / 7.0) * 100.0);
                }

                bool hvac_on = fan_speed > 0;
                id(hvac_status_sensor).publish_state(hvac_on ? "On" : "Off");
                id(climate_control_status_sensor).publish_state(hvac_on ? "On" : "Off");

                if (!hvac_on) {
                  id(ac_status_sensor).publish_state("Off");
                }

                // Vents (Air duct)
                if (x[2] == 136) id(hvac_vent_mode_sensor).publish_state("Face");
                else if (x[2] == 144) id(hvac_vent_mode_sensor).publish_state("Face/Feet");
                else if (x[2] == 152) id(hvac_vent_mode_sensor).publish_state("Feet");
                else if (x[2] == 160) id(hvac_vent_mode_sensor).publish_state("Feet/Defrost");
                else if (x[2] == 168) id(hvac_vent_mode_sensor).publish_state("Defrost");

                // Intake 
                if (x[3] == 0) id(hvac_intake_mode_sensor).publish_state("Off");
                else if (x[3] == 18) id(hvac_intake_mode_sensor).publish_state("Fresh Air");
                else if (x[3] == 9) id(hvac_intake_mode_sensor).publish_state("Recirculation");
              }

      # --------------------------------------------------------------------------
      # 0x54C - Ambient temperature / Evaporator / Fan voltage
      # --------------------------------------------------------------------------
      - can_id: 0x54C
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 7) {
                if (x[6] != 0xFF) {
                  float temp = (x[6] * 0.5) - 40.5;
                  if (temp > -30.0 && temp < 60.0) {
                    id(ambient_temp_sensor).publish_state(temp);
                  }
                }

                float evap_temp = x[0] * 0.25;
                if (evap_temp >= -30.0 && evap_temp <= 80.0) {
                  id(evaporator_temp_sensor).publish_state(evap_temp);
                }

                float fan_voltage = x[5] * 0.05;
                if (fan_voltage >= 0.0 && fan_voltage <= 16.0) {
                  id(fan_voltage_sensor).publish_state(fan_voltage);
                }
              }

      # --------------------------------------------------------------------------
      # 0x54F - Cabin temperature
      # --------------------------------------------------------------------------
      - can_id: 0x54F
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 6) {
                // Real cabin temperature is in byte 3 (offset -40)
                if (x[3] != 0xFF && x[3] != 0x00) { 
                  float cabin_temp = (x[3] * 0.5) - 40.0;
                  if (cabin_temp > -20.0 && cabin_temp < 60.0) {
                    id(cabin_temp_sensor).publish_state(cabin_temp);
                  }
                }

                float ac_power_kw = (x[1] * 50.0) / 1000.0;
                if (ac_power_kw >= 0.0 && ac_power_kw <= 15.0) {
                  id(ac_power_sensor).publish_state(ac_power_kw);
                  if (ac_power_kw > 0.1) id(ac_status_sensor).publish_state("On");
                }

                float heater_power_kw = ((x[5] & 0x3F) * 300.0) / 1000.0;
                if (heater_power_kw >= 0.0 && heater_power_kw <= 15.0) {
                  id(heater_power_sensor).publish_state(heater_power_kw);
                }
              }

      # --------------------------------------------------------------------------
      # 0x55A - Motor / Inverter temperatures
      # --------------------------------------------------------------------------
      - can_id: 0x55A
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 5) {
                float inverter_temp = x[1] / 2.0;
                float igbt_temp = x[2] / 2.0;
                float igbt_driver_temp = x[3] / 2.0;
                float motor_temp = x[4] / 2.0;

                if (inverter_temp > -30.0 && inverter_temp < 120.0) {
                  if (id(last_inv_temp) == 0 || fabs(inverter_temp - id(last_inv_temp)) < 10) {
                    id(last_inv_temp) = inverter_temp;
                    id(inverter_temp_sensor).publish_state(inverter_temp);
                  }
                }

                if (igbt_temp > -30.0 && igbt_temp < 120.0) {
                  id(igbt_temp_sensor).publish_state(igbt_temp);
                }

                if (igbt_driver_temp > -30.0 && igbt_driver_temp < 120.0) {
                  id(igbt_driver_temp_sensor).publish_state(igbt_driver_temp);
                }

                if (motor_temp > -30.0 && motor_temp < 120.0 && motor_temp != 0.0) {
                  id(motor_temp_sensor).publish_state(motor_temp);
                }
              }

      # --------------------------------------------------------------------------
      # 0x55B - LBC SOC
      # --------------------------------------------------------------------------
      - can_id: 0x55B
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 2) {
                uint16_t raw = ((x[0] << 8) | x[1]) >> 6;

                if (raw != 0x3FF) {
                  float soc = raw / 10.0;
                  if (soc >= 0.0 && soc <= 100.0) {
                    id(lbc_soc_sensor).publish_state(soc);
                    id(usable_soc_sensor).publish_state(soc);
                  }
                }
              }

      # --------------------------------------------------------------------------
      # 0x59E - Battery Energy and Charge Estimates
      # --------------------------------------------------------------------------
      - can_id: 0x59E
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 8) {
                uint16_t raw_full = ((x[2] & 0x1F) << 4) | (x[3] >> 4);
                float full_wh = raw_full * 100.0;

                uint16_t raw_remain = ((x[3] & 0x0F) << 5) | (x[4] >> 3);
                float remain_wh = raw_remain * 100.0;

                if (full_wh > 10000.0 && full_wh < 70000.0) {
                  id(full_capacity_wh) = full_wh;
                  id(full_capacity_sensor).publish_state(full_wh / 1000.0);
                }

                if (remain_wh > 0.0 && remain_wh < 70000.0) {
                  id(remaining_energy_wh) = remain_wh;
                  id(remaining_energy_sensor).publish_state(remain_wh / 1000.0);
                }

                if (id(full_capacity_wh) > 10000.0 && id(remaining_energy_wh) > 0.0) {
                  float calculated_soc = (id(remaining_energy_wh) / id(full_capacity_wh)) * 100.0;
                  if (calculated_soc >= 0.0 && calculated_soc <= 100.0) {
                    id(calculated_energy_soc_sensor).publish_state(calculated_soc);
                  }
                  
                  // --- PHYSICAL CHARGE TIME CALCULATION ---
                  // Using actual missing_kwh and constants extracted from the dashboard
                  float missing_kwh = (id(full_capacity_wh) - id(remaining_energy_wh)) / 1000.0;
                  if (missing_kwh < 0) missing_kwh = 0;
                  
                  float time_3kw = (missing_kwh / 2.6) * 60.0;  // 13h30
                  float time_6kw = (missing_kwh / 3.9) * 60.0;  // 9h00
                  float time_qc = (missing_kwh / 23.0) * 60.0;  // 1h30

                  id(remaining_charge_time_3kw_sensor).publish_state(time_3kw);
                  id(remaining_charge_time_6kw_sensor).publish_state(time_6kw);
                  id(remaining_charge_time_qc_sensor).publish_state(time_qc);
                }
              }

      # --------------------------------------------------------------------------
      # 0x5BC - GIDs, SOH and Dashboard Temperature
      # --------------------------------------------------------------------------
      - can_id: 0x5BC
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 8) {
                // --- GIDs ---
                uint16_t gids = ((x[0] << 2) | (x[1] >> 6)) & 0x3FF;
                static uint16_t last_valid_gids = 0;
                int diff = (int)gids - (int)last_valid_gids;

                if (gids > 0 && gids < 600) {
                  if (last_valid_gids == 0 || std::abs(diff) < 50) {
                    last_valid_gids = gids;
                    id(gids_sensor).publish_state(gids);
                  } else if (gids != 500) { 
                    last_valid_gids = gids;
                    id(gids_sensor).publish_state(gids);
                  }
                }

                // --- SOH ---
                uint8_t soh = (x[4] >> 1) & 0x7F;
                if (soh > 0 && soh <= 100) {
                  id(soh_sensor).publish_state(soh);
                }

                // --- Dashboard Temperature ---
                uint8_t temp_dash_raw = x[3];
                float temp_dash_percent = temp_dash_raw * 0.4166666;
                if (temp_dash_percent >= 0.0 && temp_dash_percent <= 100.0) {
                  id(battery_temp_dash_sensor).publish_state(temp_dash_percent);
                }
              }

      # --------------------------------------------------------------------------
      # 0x5C0 - Battery temperature / Heater
      # --------------------------------------------------------------------------
      - can_id: 0x5C0
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 8) {
                uint8_t mux = x[0] & 0x07;

                if (mux == 1 || mux == 2 || mux == 3) {
                  float wakeup_temp = ((x[1] >> 1) & 0x7F) - 40.0;
                  float hist_temp = ((x[2] >> 1) & 0x7F) - 40.0;

                  if (hist_temp > -30.0 && hist_temp < 80.0) {
                    id(battery_temp_sensor).publish_state(hist_temp);
                  }

                  if (wakeup_temp > -30.0 && wakeup_temp < 80.0) {
                    id(battery_wakeup_temp_sensor).publish_state(wakeup_temp);
                  }
                }

                bool heat_start_req = x[0] & 0x20;
                bool heat_stop_req = x[0] & 0x10;
                bool heater_mail_req = x[1] & 0x01;
                bool battery_heater_exists = x[4] & 0x01;

                id(battery_heater_start_sensor).publish_state(heat_start_req ? "Requested" : "No");
                id(battery_heater_stop_sensor).publish_state(heat_stop_req ? "Requested" : "No");
                id(battery_heater_mail_sensor).publish_state(heater_mail_req ? "Requested" : "No");
                id(battery_heater_exists_sensor).publish_state(battery_heater_exists ? "Yes" : "No");

                id(battery_heater_dtc_sensor).publish_state(x[7]);
              }

      # ========================================================================
      # BMS PACKAGE (Cell Balancing / Shunts)
      # ========================================================================
      - can_id: 0x501
        use_extended_id: false
        then: &bms_shunt_logic
          - lambda: |-
              // Count how many bits are '1' in the frame bytes
              int active_shunts = 0;
              for(int i=0; i<x.size(); i++) {
                active_shunts += __builtin_popcount(x[i]); 
              }
              
              static int last_shunts = -1;
              if (active_shunts != last_shunts) {
                last_shunts = active_shunts;
                id(bms_active_shunts_sensor).publish_state(active_shunts);
              }
      
      - can_id: 0x502
        use_extended_id: false
        then: *bms_shunt_logic
      - can_id: 0x503
        use_extended_id: false
        then: *bms_shunt_logic
      - can_id: 0x504
        use_extended_id: false
        then: *bms_shunt_logic

# ==============================================================================
# NUMERIC SENSORS
# ==============================================================================
sensor:

  - platform: template
    name: "LBC SOC"
    id: lbc_soc_sensor
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:battery"

  - platform: template
    name: "Usable SOC"
    id: usable_soc_sensor
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:battery"

  - platform: template
    name: "Calculated Energy SOC"
    id: calculated_energy_soc_sensor
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:battery-sync"

  - platform: template
    name: "State of Health (SOH)"
    id: soh_sensor
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:heart-pulse"

  - platform: template
    name: "GIDs"
    id: gids_sensor
    unit_of_measurement: "GIDs"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:car-battery"

  - platform: template
    name: "Remaining Energy"
    id: remaining_energy_sensor
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: measurement
    accuracy_decimals: 2
    icon: "mdi:battery-charging"

  - platform: template
    name: "Full Capacity"
    id: full_capacity_sensor
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: measurement
    accuracy_decimals: 2
    icon: "mdi:battery-high"

  - platform: template
    name: "Remaining Time (3kW Plug)"
    id: remaining_charge_time_3kw_sensor
    unit_of_measurement: "min"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:ev-plug-type2"

  - platform: template
    name: "Remaining Time (6kW Wallbox)"
    id: remaining_charge_time_6kw_sensor
    unit_of_measurement: "min"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:wall-sconce-flat"

  - platform: template
    name: "Remaining Time (50kW QC)"
    id: remaining_charge_time_qc_sensor
    unit_of_measurement: "min"
    state_class: measurement
    accuracy_decimals: 0
    icon: "mdi:ev-plug-chademo"

  - platform: template
    name: "HV Battery Voltage"
    id: battery_voltage_sensor
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:flash"

  - platform: template
    name: "HV Battery Current"
    id: battery_current_sensor
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:current-dc"

  - platform: template
    name: "HV Instant Power"
    id: hv_power_sensor
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    icon: "mdi:lightning-bolt"

  - platform: template
    name: "Max Discharge Power"
    id: discharge_limit_sensor
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    icon: "mdi:battery-arrow-down"

  - platform: template
    name: "Max Charge Power"
    id: charge_limit_sensor
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    icon: "mdi:battery-arrow-up"

  - platform: template
    name: "OBC Max Power"
    id: obc_max_power_sensor
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:ev-plug-type2"

  - platform: template
    name: "Battery Temperature"
    id: battery_temp_sensor
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
