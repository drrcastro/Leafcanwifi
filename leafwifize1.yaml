# ==============================================================================
# SWITCHES (Control Modes)
# ==============================================================================
switch:
  - platform: template
    name: "Debug Polling Mode"
    id: debug_polling_switch
    icon: "mdi:bug-check"
    optimistic: true

# ==============================================================================
# BUTTONS
# ==============================================================================
button:
  - platform: restart
    name: "Restart Leaf Module"

  - platform: template
    name: "Wake EV-CAN Bus"
    id: force_can_poll_button
    icon: "mdi:radar"
    on_press:
      - script.execute: send_can_queries

# ==============================================================================
# PASSIVE WAKE-UP
# ==============================================================================
interval:
  - interval: 15s
    then:
      - if:
          condition:
            lambda: |-
              return id(debug_polling_switch).state || 
                     id(is_charging) || 
                     id(car_status_sensor).state == "ON" || 
                     id(car_status_sensor).state == "ACC" || 
                     id(car_status_sensor).state == "Charging/Standby";
          then:
            - script.execute: send_can_queries

script:
  - id: send_can_queries
    mode: queued
    then:
      # Send a simple wake-up frame to keep the bus alive if needed
      - repeat:
          count: 10
          then:
            - canbus.send:
                data: [0x00]
                can_id: 0x56E
                use_extended_id: false
            - delay: 50ms
