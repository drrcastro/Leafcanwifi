esphome:
  name: leaf-can
  friendly_name: Leaf CAN Monitor

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

wifi:
  ssid: "YourSSID"
  password: "YourPassword"
  use_address: 192.168.1.changeip
  manual_ip:
    static_ip: 192.168.1.changeip
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "leaf-can-fallback"
    password: "fallback123"

logger:
  logs:
    canbus: INFO
    charge: INFO

web_server:
  port: 80

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "your_ota_password"

globals:
  - id: is_charging
    type: bool
    restore_value: no
    initial_value: "false"

  - id: plug_connected
    type: bool
    restore_value: no
    initial_value: "false"

  - id: soc_at_charge_start
    type: float
    restore_value: no
    initial_value: "-1.0"

  - id: charge_energy_wh
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: last_current
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: last_voltage
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: last_energy_update
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: charging_session_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: battery_capacity_wh
    type: float
    restore_value: yes
    initial_value: "34000.0"

  - id: last_written_capacity_wh
    type: float
    restore_value: no
    initial_value: "0.0"

canbus:
  - platform: esp32_can
    tx_pin: GPIO4
    rx_pin: GPIO5
    can_id: 999
    bit_rate: 500KBPS

    on_frame:
      - can_id: 0x11A
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 2) {
                uint8_t gear = (x[0] >> 4) & 0x0F;
                if (gear == 4) id(gear_shift_sensor).publish_state("Drive/B");
                else if (gear == 3) id(gear_shift_sensor).publish_state("Neutral");
                else if (gear == 2) id(gear_shift_sensor).publish_state("Reverse");
                else if (gear == 0) id(gear_shift_sensor).publish_state("Park");
                else id(gear_shift_sensor).publish_state("Unknown");

                uint8_t car_on = (x[1] >> 5) & 0x07;
                if (car_on == 4) id(car_status_sensor).publish_state("OFF");
                else if (car_on == 8) id(car_status_sensor).publish_state("ON");
                else id(car_status_sensor).publish_state("Unknown");
              }

      - can_id: 0x55B
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 2) {
                uint16_t raw = ((x[0] << 8) | x[1]) >> 6;
                float soc = raw / 10.0;
                id(lbc_soc_sensor).publish_state(soc);

                // Actively charging = plug connected AND current flowing
                bool actively_charging = id(plug_connected) && id(last_current) > 0.5;
                id(is_charging) = actively_charging;

                if (actively_charging) {
                  uint32_t now = millis();

                  // Start session
                  if (!id(charging_session_active)) {
                    id(charging_session_active) = true;
                    id(soc_at_charge_start) = soc;
                    id(charge_energy_wh) = 0.0;
                    id(last_energy_update) = now;
                    ESP_LOGI("charge", "Session started at SOC %.1f%%", soc);
                  }

                  // Catch reconnect with no reference SOC yet
                  if (id(soc_at_charge_start) < 0.0) {
                    id(soc_at_charge_start) = soc;
                    id(last_energy_update) = now;
                    ESP_LOGI("charge", "Session SOC reference set at %.1f%%", soc);
                  }

                  // Accumulate energy
                  if (id(last_energy_update) > 0 && id(last_current) > 0.1 && id(last_voltage) > 100.0) {
                    float dt_hours = (now - id(last_energy_update)) / 3600000.0;
                    float power_w = id(last_current) * id(last_voltage);
                    id(charge_energy_wh) += power_w * dt_hours;
                    id(last_energy_update) = now;
                  }

                  // Calculate capacity after 5% SOC rise
                  float soc_rise = soc - id(soc_at_charge_start);
                  if (soc_rise >= 5.0 && id(charge_energy_wh) > 100.0) {
                    float calculated = (id(charge_energy_wh) / soc_rise) * 100.0;
                    if (calculated >= 20000.0 && calculated <= 45000.0) {
                      id(battery_capacity_wh) = calculated;
                      id(estimated_capacity_sensor).publish_state(calculated / 1000.0);
                      ESP_LOGI("charge", "Capacity estimate: %.0f Wh", calculated);
                      if (abs(calculated - id(last_written_capacity_wh)) > 500.0) {
                        id(last_written_capacity_wh) = calculated;
                        ESP_LOGI("charge", "Capacity written to flash: %.0f Wh", calculated);
                      }
                    }
                  }

                  // Time to 80% and 100%
                  float power_w = id(last_current) * id(last_voltage);
                  if (power_w > 100.0) {
                    float capacity = id(battery_capacity_wh);
                    float wh_to_80 = ((80.0 - soc) / 100.0) * capacity;
                    float wh_to_100 = ((100.0 - soc) / 100.0) * capacity;
                    if (wh_to_80 > 0) {
                      id(time_to_80_sensor).publish_state((wh_to_80 / power_w) * 60.0);
                    } else {
                      id(time_to_80_sensor).publish_state(0);
                    }
                    id(time_to_100_sensor).publish_state((wh_to_100 / power_w) * 60.0);
                  }

                } else {
                  // Not actively charging
                  if (id(charging_session_active)) {
                    id(charging_session_active) = false;
                    id(soc_at_charge_start) = -1.0;
                    ESP_LOGI("charge", "Session ended");
                  }
                  id(time_to_80_sensor).publish_state(-1);
                  id(time_to_100_sensor).publish_state(-1);
                }
              }

      - can_id: 0x54C
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 7) {
                float temp = (x[6] * 0.5) - 40.5;
                id(ambient_temp_sensor).publish_state(temp);
              }

      - can_id: 0x1DB
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 6) {
                int16_t raw_current = ((x[0] << 3) | (x[1] >> 5)) & 0x7FF;
                if (raw_current & 0x400) raw_current |= 0xF800;
                float current = raw_current * 0.5;
                id(last_current) = current;
                id(battery_current_sensor).publish_state(current);

                uint16_t raw_voltage = ((x[2] << 2) | (x[3] >> 6)) & 0x3FF;
                float voltage = raw_voltage * 0.5;
                id(last_voltage) = voltage;
                id(battery_voltage_sensor).publish_state(voltage);
              }

      - can_id: 0x1DC
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 4) {
                uint16_t raw_discharge = ((x[0] << 2) | (x[1] >> 6)) & 0x3FF;
                float discharge = raw_discharge * 0.25;
                if (isnan(id(discharge_power_limit_sensor).state) ||
                    abs(discharge - id(discharge_power_limit_sensor).state) > 1.0) {
                  id(discharge_power_limit_sensor).publish_state(discharge);
                }

                uint16_t raw_charge = ((x[1] << 4) | (x[2] >> 4)) & 0x3FF;
                float charge_limit = raw_charge * 0.25;
                if (isnan(id(charge_power_limit_sensor).state) ||
                    abs(charge_limit - id(charge_power_limit_sensor).state) > 1.0) {
                  id(charge_power_limit_sensor).publish_state(charge_limit);
                }
              }

      - can_id: 0x5BC
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 6) {
                uint16_t gids = ((x[0] << 2) | (x[1] >> 6)) & 0x3FF;
                id(gids_sensor).publish_state(gids);

                uint8_t soh = (x[4] >> 1) & 0x7F;
                id(soh_sensor).publish_state(soh);
              }

      - can_id: 0x1D4
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 7) {
                uint8_t b6 = x[6];
                if (b6 == 0xE0) {
                  id(plug_connected) = true;
                  // Charge status text depends on actual current
                  if (id(last_current) > 0.5) {
                    id(charge_status_sensor).publish_state("Charging");
                  } else {
                    id(charge_status_sensor).publish_state("Plugged In");
                  }
                } else if (b6 == 0x8C) {
                  id(plug_connected) = false;
                  id(charge_status_sensor).publish_state("Interrupted");
                } else {
                  id(plug_connected) = false;
                  id(charge_status_sensor).publish_state("Not Plugged In");
                }
              }

      - can_id: 0x1F2
        use_extended_id: false
        then:
          - lambda: |-
              if (x.size() >= 3) {
                bool connector = (x[2] >> 1) & 0x01;
                id(connector_sensor).publish_state(connector);
              }

sensor:
  - platform: template
    name: "LBC SOC"
    id: lbc_soc_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:battery"

  - platform: template
    name: "Battery Voltage"
    id: battery_voltage_sensor
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: "mdi:flash"

  - platform: template
    name: "Battery Current"
    id: battery_current_sensor
    unit_of_measurement: "A"
    accuracy_decimals: 1
    icon: "mdi:current-dc"

  - platform: template
    name: "Discharge Power Limit"
    id: discharge_power_limit_sensor
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    icon: "mdi:battery-arrow-down"

  - platform: template
    name: "Charge Power Limit"
    id: charge_power_limit_sensor
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    icon: "mdi:battery-arrow-up"

  - platform: template
    name: "GIDS"
    id: gids_sensor
    unit_of_measurement: "GIDs"
    accuracy_decimals: 0
    icon: "mdi:car-battery"

  - platform: template
    name: "State of Health"
    id: soh_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:heart-pulse"

  - platform: template
    name: "Ambient Temperature"
    id: ambient_temp_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer"

  - platform: template
    name: "Time to 80%"
    id: time_to_80_sensor
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: "mdi:clock-fast"

  - platform: template
    name: "Time to 100%"
    id: time_to_100_sensor
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: "mdi:clock-end"

  - platform: template
    name: "Estimated Capacity"
    id: estimated_capacity_sensor
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    icon: "mdi:battery-high"
  
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: "mdi:wifi"

binary_sensor:
  - platform: template
    name: "Connector"
    id: connector_sensor
    icon: "mdi:power-plug"

text_sensor:
  - platform: template
    name: "Gear Shift"
    id: gear_shift_sensor
    icon: "mdi:car-shift-pattern"

  - platform: template
    name: "Car Status"
    id: car_status_sensor
    icon: "mdi:car-info"

  - platform: template
    name: "Charge Status"
    id: charge_status_sensor
    icon: "mdi:ev-station"

button:
  - platform: restart
    name: "Leaf CAN Restart"

  - platform: template
    name: "Wake Car"
    icon: "mdi:car-connected"
    on_press:
      - repeat:
          count: 5
          then:
            - canbus.send:
                data: [0x00]
                can_id: 0x56E
                use_extended_id: false
            - delay: 50ms